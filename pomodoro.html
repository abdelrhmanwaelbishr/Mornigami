<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mornigami</title>
    <meta name="description" content="Morning + Origami = Mornigami. Shape your morning and fold your habits into structure.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Fraunces:wght@600;700;800&display=swap"
        rel="stylesheet">
    <link rel="icon" type="image/png" href="icon.png">
    <link rel="stylesheet" href="style.css">
</head>
 
<body>
    <!-- Navigation Bar -->
    <nav class="main-nav">
        <div class="nav-content">
            <div class="nav-brand">
                <div class="brand-icon">
                    <img src="icon.png" alt="Mornigami Logo" style="width: 32px; height: 32px; object-fit: contain;">
                </div>
                <div class="brand-text-container" style="display: flex; flex-direction: column; line-height: 1.1;">
                    <span class="nav-brand-text" style="font-size: 1.25rem; font-weight: 800; letter-spacing: -0.03em;">Mornigami</span>
                    <span class="nav-brand-subtext" style="font-size: 0.65rem; color: var(--color-text-secondary); font-weight: 500;">Shape your Morning</span>
                </div>
            </div>
            <div class="nav-links">
                <a href="index.html" class="nav-link">Habit Tracker</a>
                <a href="todo.html" class="nav-link">To-Do List</a>
                <a href="pomodoro.html" class="nav-link active">Pomodoro</a>
            </div>
            <div class="nav-actions" style="display: flex; gap: var(--spacing-sm); align-items: center;">
                <div class="accent-picker-wrapper" style="position: relative; display: flex; align-items: center;">
                    <button class="btn-icon" id="accentColorBtn" title="Change accent color">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M12 22C17.52 22 22 17.52 22 12S17.52 2 12 2 2 6.48 2 12s4.48 10 10 10z" />
                            <circle cx="7.5" cy="10.5" r="1.5" fill="currentColor" />
                            <circle cx="11.5" cy="7.5" r="1.5" fill="currentColor" />
                            <circle cx="16.5" cy="9.5" r="1.5" fill="currentColor" />
                            <circle cx="15.5" cy="14.5" r="1.5" fill="currentColor" />
                        </svg>
                    </button>
                    <div class="accent-color-dropdown" id="accentColorDropdown"></div>
                </div>
                <button class="btn-icon" id="themeToggle" title="Toggle theme">
                    <svg class="theme-icon sun-icon" width="20" height="20" viewBox="0 0 20 20" fill="none">
                        <circle cx="10" cy="10" r="4" stroke="currentColor" stroke-width="1.5" />
                        <path
                            d="M10 2V3M10 17V18M18 10H17M3 10H2M15.657 4.343L14.95 5.05M5.05 14.95L4.343 15.657M15.657 15.657L14.95 14.95M5.05 5.05L4.343 4.343"
                            stroke="currentColor" stroke-width="1.5" stroke-linecap="round" />
                    </svg>
                    <svg class="theme-icon moon-icon" width="20" height="20" viewBox="0 0 20 20" fill="none">
                        <path
                            d="M17 10.5C16.9 14.6 13.6 18 9.5 18C5.4 18 2 14.6 2 10.5C2 6.9 4.5 3.9 8 3.1C7.4 3.9 7 4.9 7 6C7 8.8 9.2 11 12 11C13.1 11 14.1 10.6 14.9 10C14.9 10.2 17 10.3 17 10.5Z"
                            stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" />
                    </svg>
                </button>
            </div>
        </div>
    </nav>

    <!-- Main Container -->
    <div class="app-container">
        <!-- Header -->
        <header class="app-header">
            <div class="header-content">
                <div class="brand-text">
                    <h1 class="brand-title">Pomodoro Timer</h1>
                    <p class="brand-subtitle">Focus better, work smarter</p>
                </div>
            </div>
        </header>

        <!-- Main Content -->
        <main class="app-main">
            <!-- Stats Overview -->
            <section class="stats-section">
                <div class="stat-card">
                    <div class="stat-icon stat-icon-blue">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
                            <circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="2" />
                            <path d="M12 6V12L16 14" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                                stroke-linejoin="round" />
                        </svg>
                    </div>
                    <div class="stat-content">
                        <p class="stat-label">Sessions Today</p>
                        <p class="stat-value" id="sessionsToday">0</p>
                    </div>
                </div>

                <div class="stat-card">
                    <div class="stat-icon stat-icon-green">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
                            <path d="M13 2L3 14H12L11 22L21 10H12L13 2Z" fill="currentColor" />
                        </svg>
                    </div>
                    <div class="stat-content">
                        <p class="stat-label">Focus Time</p>
                        <p class="stat-value" id="totalFocusTime">0m</p>
                    </div>
                </div>

                <div class="stat-card">
                    <div class="stat-icon stat-icon-orange">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
                            <path
                                d="M12 2L15.09 8.26L22 9.27L17 14.14L18.18 21.02L12 17.77L5.82 21.02L7 14.14L2 9.27L8.91 8.26L12 2Z"
                                fill="currentColor" />
                        </svg>
                    </div>
                    <div class="stat-content">
                        <p class="stat-label">Current Streak</p>
                        <p class="stat-value" id="currentStreak">0</p>
                    </div>
                </div>
            </section>

            <!-- Timer Section -->
            <section class="pomodoro-section">
                <div class="pomodoro-card">
                    <!-- Mode Selector & Settings -->
                    <div class="pomodoro-header-row">
                        <div class="mode-selector">
                            <button class="mode-btn active" data-mode="work">Work</button>
                            <button class="mode-btn" data-mode="short">Short Break</button>
                            <button class="mode-btn" data-mode="long">Long Break</button>
                        </div>
                        <button class="btn-settings-icon" id="settingsBtn" title="Pomodoro Settings">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <circle cx="12" cy="12" r="3" />
                                <path
                                    d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z" />
                            </svg>
                        </button>
                    </div>

                    <!-- Timer Display -->
                    <div class="timer-display">
                        <svg class="timer-ring" width="320" height="320" viewBox="0 0 320 320">
                            <circle class="timer-ring-bg" cx="160" cy="160" r="140" />
                            <circle class="timer-ring-progress" cx="160" cy="160" r="140" id="timerProgress" />
                        </svg>
                        <div class="timer-content">
                            <div class="timer-time" id="timerDisplay">25:00</div>
                            <div class="timer-label" id="timerLabel">Focus Time</div>
                        </div>
                    </div>

                    <!-- Timer Controls -->
                    <div class="timer-controls">
                        <button class="btn-timer-primary" id="startBtn">
                            <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
                                <path d="M8 5V19L19 12L8 5Z" fill="currentColor" />
                            </svg>
                            <span>Start</span>
                        </button>
                        <button class="btn-timer-secondary" id="resetBtn">
                            <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
                                <path
                                    d="M4 12C4 16.4183 7.58172 20 12 20C16.4183 20 20 16.4183 20 12C20 7.58172 16.4183 4 12 4C9.25 4 6.82 5.38 5.38 7.5"
                                    stroke="currentColor" stroke-width="2" stroke-linecap="round" />
                                <path d="M4 4V8H8" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                                    stroke-linejoin="round" />
                            </svg>
                            <span>Reset</span>
                        </button>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <!-- Settings Modal -->
    <div id="settingsModal" class="modal">
        <div class="modal-backdrop"></div>
        <div class="modal-container">
            <div class="modal-content">
                <div class="modal-header">
                    <h2 class="modal-title">Timer Settings</h2>
                    <button class="modal-close" id="closeSettings">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
                            <path d="M18 6L6 18M6 6L18 18" stroke="currentColor" stroke-width="2"
                                stroke-linecap="round" />
                        </svg>
                    </button>
                </div>

                <form id="settingsForm" class="modal-form">
                    <div class="form-group">
                        <label for="workDuration" class="form-label">Work Duration</label>
                        <div class="input-with-suffix">
                            <input type="number" id="workDuration" class="form-input" value="25" min="1" max="60"
                                required>
                            <span class="input-suffix">minutes</span>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="shortBreakDuration" class="form-label">Short Break Duration</label>
                        <div class="input-with-suffix">
                            <input type="number" id="shortBreakDuration" class="form-input" value="5" min="1" max="30"
                                required>
                            <span class="input-suffix">minutes</span>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="longBreakDuration" class="form-label">Long Break Duration</label>
                        <div class="input-with-suffix">
                            <input type="number" id="longBreakDuration" class="form-input" value="15" min="1" max="60"
                                required>
                            <span class="input-suffix">minutes</span>
                        </div>
                    </div>

                    <div class="modal-footer">
                        <button type="button" class="btn-secondary" id="cancelSettings">Cancel</button>
                        <button type="submit" class="btn-primary">Save Settings</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="pomodoro.js"></script>
</body>

</html>
